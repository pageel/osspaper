<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  
  <!-- App Icon Base -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="#0B0F19"/>
  
  <!-- Open Book Left Page -->
  <path d="M 30 45 Q 45 35, 60 45 L 60 85 Q 45 75, 30 85 Z" fill="url(#pageGrad)" opacity="0.9"/>
  
  <!-- Open Book Right Page -->
  <path d="M 90 45 Q 75 35, 60 45 L 60 85 Q 75 75, 90 85 Z" fill="url(#pageGrad)" opacity="0.9"/>
  
  <!-- Decorative Lines (Text representation) -->
  <path d="M 38 55 L 52 55" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 38 65 L 48 65" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  
  <path d="M 82 55 L 68 55" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 82 65 L 72 65" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>

  <!-- Central Star / Spark (Agentic AI) -->
  <circle cx="60" cy="35" r="6" fill="url(#accentGrad)"/>
  <!-- Spark Rays -->
  <path d="M 60 20 L 60 26 M 60 44 L 60 50 M 45 35 L 51 35 M 69 35 L 75 35" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 50 25 L 54 29 M 70 45 L 66 41 M 50 45 L 54 41 M 70 25 L 66 29" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
